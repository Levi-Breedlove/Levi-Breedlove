# Generates a Pac-Man style GitHub contribution animation
name: Generate Pac-Man

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

permissions:
  contents: write

# Forces JavaScript GitHub Actions to run on Node 24 now
# This helps future-proof the workflow before GitHub switches the default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # Generates the Pac-Man contribution graph SVG files
      - name: Generate Pac-Man contribution graph
        uses: abozanona/pacman-contribution-graph@v3.2.5
        with:
          github_user_name: ${{ github.repository_owner }}
          games: pacman

      # Pushes the generated SVG files to the output branch
      # v5 uses Node 24, while v4 still declares Node 20.
      - name: Push Pac-Man SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
