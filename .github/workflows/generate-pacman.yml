# Generates a Pac-Man style GitHub contribution animation
name: Generate Pac-Man

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # Generates the Pac-Man contribution graph SVG files
      - name: Generate Pac-Man contribution graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

          # Only generate Pac-Man
          games: pacman

          # Makes Pac-Man play more boldly.
          # Options: conservative, opportunistic, aggressive
          player_style: aggressive

      # Pushes the generated SVG files to the output branch
      - name: Push Pac-Man SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
