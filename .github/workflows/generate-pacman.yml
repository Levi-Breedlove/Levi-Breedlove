# Generates a Pac-Man style GitHub contribution animation
name: Generate Pac-Man

on:
  # Runs once per day at midnight UTC
  schedule:
    - cron: "0 0 * * *"

  # Lets you manually run it from the GitHub Actions tab
  workflow_dispatch:

  # Regenerates when you push changes to main
  push:
    branches:
      - main

# Required so the workflow can push generated SVG files to the output branch
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # Generates the Pac-Man contribution graph SVG files
      - name: Generate Pac-Man contribution graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

          # Only generate Pac-Man.
          # Other options: breakout, galaga, puzzle-bobble
          games: pacman

      # Pushes the generated SVG files to the output branch
      - name: Push Pac-Man SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
